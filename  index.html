// INIT MAP
// ============================================================
const map = L.map('map', {
  center: [56.0, -96.0],
  zoom: 4,
  minZoom: 3,
  maxZoom: 14,
  zoomControl: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// Custom icon
function createIcon() {
  return L.divIcon({
    className: '',
    html: '<div class="fci-marker"><div class="fci-marker-ring"></div><div class="fci-marker-dot"></div></div>',
    iconSize: [28, 28],
    iconAnchor: [14, 14],
    popupAnchor: [0, -14]
  });
}

// ============================================================
// POPULATE FILTERS
// ============================================================
const provinces = [...new Set(POLICIES.map(p => p.province))].sort();
const categories = [...new Set(POLICIES.map(p => p.category))].sort();

const provinceFilter = document.getElementById('provinceFilter');
const categoryFilter = document.getElementById('categoryFilter');

provinces.forEach(prov => {
  const opt = document.createElement('option');
  opt.value = prov;
  opt.textContent = prov;
  provinceFilter.appendChild(opt);
});

categories.forEach(cat => {
  const opt = document.createElement('option');
  opt.value = cat;
  opt.textContent = cat;
  categoryFilter.appendChild(opt);
});

// ============================================================
// MARKERS & RENDERING
// ============================================================
let markers = [];
let activeCardId = null;

function buildPopupHTML(policy) {
  const link = policy.sourceUrl && policy.sourceUrl !== '#'
    ? `<a class="popup-link" href="${policy.sourceUrl}" target="_blank" rel="noopener">View source &rarr;</a>`
    : '';
  return `
    <div class="popup-inner">
      <div class="popup-header">
        <h3>${policy.name}</h3>
        <div class="popup-city">${policy.city}, ${policy.province}</div>
      </div>
      <div class="popup-body">
        <div class="popup-meta-row">
          <span class="popup-tag">${policy.category}</span>
          <span class="popup-tag">${policy.year}</span>
        </div>
        <p>${policy.summary}</p>
        ${link}
      </div>
    </div>
  `;
}

function renderPolicies(filtered) {
  // Clear markers
  markers.forEach(m => map.removeLayer(m.marker));
  markers = [];

  // Add new markers
  filtered.forEach(policy => {
    const marker = L.marker([policy.lat, policy.lng], { icon: createIcon() })
      .bindPopup(buildPopupHTML(policy), { maxWidth: 320, closeButton: true })
      .addTo(map);

    marker.on('click', () => {
      setActiveCard(policy.id);
    });

    markers.push({ policy, marker });
  });

  // Render sidebar list
  const listEl = document.getElementById('policyList');
  if (filtered.length === 0) {
    listEl.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <p>No policies match your current filters.<br>Try broadening your search.</p>
      </div>
    `;
  } else {
    listEl.innerHTML = filtered.map(p => `
      <div class="policy-card" data-id="${p.id}">
        <div class="policy-card-title">${p.name}</div>
        <div class="policy-card-meta">
          <span>${p.city}, ${p.province}</span>
          <span class="policy-card-tag">${p.category}</span>
        </div>
      </div>
    `).join('');

    // Card click handlers
    listEl.querySelectorAll('.policy-card').forEach(card => {
      card.addEventListener('click', () => {
        const id = parseInt(card.dataset.id);
        const entry = markers.find(m => m.policy.id === id);
        if (entry) {
          map.setView([entry.policy.lat, entry.policy.lng], 10, { animate: true });
          entry.marker.openPopup();
          setActiveCard(id);
        }
      });
    });
  }

  document.getElementById('countNum').textContent = filtered.length;
}

function setActiveCard(id) {
  activeCardId = id;
  document.querySelectorAll('.policy-card').forEach(c => {
    c.classList.toggle('active', parseInt(c.dataset.id) === id);
  });
  // Scroll card into view
  const activeEl = document.querySelector(`.policy-card[data-id="${id}"]`);
  if (activeEl) {
    activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ============================================================
// FILTERING
// ============================================================
function getFiltered() {
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const province = provinceFilter.value;
  const category = categoryFilter.value;

  return POLICIES.filter(p => {
    if (province && p.province !== province) return false;
    if (category && p.category !== category) return false;
    if (search) {
      const haystack = `${p.name} ${p.city} ${p.province} ${p.category} ${p.summary}`.toLowerCase();
      return haystack.includes(search);
    }
    return true;
  });
}

function applyFilters() {
  const filtered = getFiltered();
  renderPolicies(filtered);

  // Fit map bounds if we have results
  if (filtered.length > 0) {
    const group = L.featureGroup(markers.map(m => m.marker));
    map.fitBounds(group.getBounds().pad(0.15), { maxZoom: 10 });
  }
}

document.getElementById('searchInput').addEventListener('input', applyFilters);
provinceFilter.addEventListener('change', applyFilters);
categoryFilter.addEventListener('change', applyFilters);

document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  provinceFilter.value = '';
  categoryFilter.value = '';
  applyFilters();
  map.setView([56.0, -96.0], 4);
});

// ============================================================
// MOBILE SIDEBAR TOGGLE
// ============================================================
document.getElementById('mobileToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});

// Close sidebar on map click (mobile)
map.on('click', () => {
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
  }
});

// ============================================================
// INITIAL RENDER
// ============================================================
renderPolicies(POLICIES);
</script>

</body>
</html>
